services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: comradwatch
      POSTGRES_USER: comradwatch
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comradwatch"]
      interval: 2s
      timeout: 5s
      retries: 10

  server:
    build: ./backend
    ports:
      - "8080:8080"
      - "1935:1935"
    environment:
      DATABASE_URL: postgres://comradwatch:devpassword@db:5432/comradwatch?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production!
      SEGMENT_DIR: /app/segments
      HTTP_PORT: "8080"
      RTMP_PORT: "1935"
      ENCRYPTION_KEY: dev-encryption-key-change-in-production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/google/callback}
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      INSTAGRAM_APP_ID: ${INSTAGRAM_APP_ID:-}
      INSTAGRAM_APP_SECRET: ${INSTAGRAM_APP_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - segments:/app/segments

volumes:
  pgdata:
  segments:
